<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comfort Zone</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  min-height:100vh;
  overflow:hidden;
  position:relative;
  color:white;
  background:#05060a;
}

/* background image */
.bg-image{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
  animation: floatBg 6s ease-in-out infinite;
  filter: brightness(0.65);
}

@keyframes floatBg{
  0%{transform:scale(1) translateY(0)}
  50%{transform:scale(1.03) translateY(-6px)}
  100%{transform:scale(1) translateY(0)}
}

/* overlay */
.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.25);
  z-index:2;
}

/* title */
.title{
  position:absolute;
  top:40px;
  width:100%;
  text-align:center;
  z-index:3;
}

.title h1{
  font-size:52px;
  text-shadow:0 4px 20px rgba(0,0,0,.5);
}

/* girl avatar */
.girl{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  font-size:90px;
  z-index:3;
  animation: shrinkGirl 10s linear infinite;
}

@keyframes shrinkGirl{
  0%{
    transform:translateX(-50%) scale(1);
    opacity:1;
  }
  100%{
    transform:translateX(-50%) scale(0.4);
    opacity:0.7;
  }
}

/* back button */
.back-btn{
  position:absolute;
  top:30px;
  left:30px;
  z-index:4;
  padding:12px 22px;
  border-radius:16px;
  background:rgba(255,255,255,.12);
  color:white;
  text-decoration:none;
  backdrop-filter:blur(10px);
}

/* mobile responsive */
@media(max-width:768px){
  .title h1{
    font-size:34px;
  }

  .girl{
    font-size:70px;
    bottom:16px;
  }

  .back-btn{
    top:18px;
    left:18px;
    padding:10px 16px;
    font-size:14px;
  }
}

@media(max-width:480px){
  .title h1{
    font-size:26px;
  }

  .girl{
    font-size:54px;
  }
}
</style>
</head>
<body>

<!-- sound -->
<audio id="comfortSong" autoplay loop>
  <source src="../music/comfort-song.mp3" type="audio/mpeg">
</audio>

<a href="../index.html" class="back-btn">⬅ Back Home</a>

<img src="friends-memory1.jpg" class="bg-image" alt="memory">

<div class="overlay"></div>

<div class="title">
  <h1> Your Comfort Zone </h1>
</div>

<div class="girl">👧</div>

<script>
window.onload = function(){
  let song = document.getElementById("comfortSong");

  song.play().catch(()=>{
    document.body.addEventListener("click", function(){
      song.play();
    }, { once:true });
  });
}
</script>

</body>
</html>
