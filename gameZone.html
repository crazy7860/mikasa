<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Tree Game</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #05060a, #121826, #2a0f3f);
            min-height: 100vh;
            overflow: hidden;
            color: white;
        }

        .game-container {
            position: relative;
            width: 100%;
            height: 100vh;
        }

        .tree {
            position: absolute;
            right: 120px;
            bottom: 70px;
            width: 220px;
            height: 420px;
        }

        .trunk {
            position: absolute;
            bottom: 0;
            left: 90px;
            width: 40px;
            height: 220px;
            background: #5b3a29;
        }

        .leaves {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: #2ecc71;
        }

        .girl {
            position: absolute;
            bottom: 60px;
            left: 80px;
            font-size: 60px;
            transition: 0.8s linear;
        }

        .note {
            position: absolute;
            font-size: 34px;
            cursor: pointer;
            animation: float 1.2s infinite alternate;
        }

        @keyframes float {
            from {
                transform: translateY(0)
            }

            to {
                transform: translateY(-10px)
            }
        }

        .score {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 28px;
        }

        .timer {
            position: absolute;
            top: 60px;
            left: 20px;
            font-size: 22px;
        }

        .rain-note {
            position: absolute;
            font-size: 28px;
            animation: fall 3s linear forwards;
        }

        @keyframes fall {
            from {
                transform: translateY(-100px)
            }

            to {
                transform: translateY(100vh)
            }
        }


        @media (max-width: 1024px) {
            .tree {
                right: 60px;
                width: 180px;
                height: 360px;
            }

            .leaves {
                width: 180px;
                height: 180px;
            }

            .trunk {
                left: 70px;
                height: 190px;
            }

            .girl {
                font-size: 50px;
                left: 40px;
            }

            .score {
                font-size: 24px;
            }

            .timer {
                font-size: 20px;
            }

            .note {
                font-size: 28px;
            }
        }

        @media (max-width: 768px) {
            .tree {
                right: 20px;
                bottom: 60px;
                width: 140px;
                height: 300px;
            }

            .leaves {
                width: 140px;
                height: 140px;
            }

            .trunk {
                left: 55px;
                width: 30px;
                height: 160px;
            }

            .girl {
                font-size: 42px;
                left: 20px;
                bottom: 40px;
            }

            .score {
                font-size: 20px;
                top: 14px;
                left: 14px;
            }

            .timer {
                font-size: 18px;
                top: 44px;
                left: 14px;
            }

            .note {
                font-size: 24px;
            }
        }

        @media (max-width: 480px) {
            body {
                overflow: hidden;
            }

            .tree {
                right: 10px;
                bottom: 40px;
                width: 110px;
                height: 240px;
            }

            .leaves {
                width: 110px;
                height: 110px;
            }

            .trunk {
                left: 42px;
                width: 24px;
                height: 130px;
            }

            .girl {
                font-size: 34px;
                left: 10px;
                bottom: 30px;
            }

            .score {
                font-size: 16px;
                top: 10px;
                left: 10px;
            }

            .timer {
                font-size: 15px;
                top: 34px;
                left: 10px;
            }

            .note {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>
    <audio id="gameSong" loop>
        <source src="../music/game-song.mp3" type="audio/mpeg">
    </audio>
    <div class="game-container">
        <div class="score">💸 Notes: <span id="score">0</span>/10</div>
        <div class="timer">⏱️ Time: <span id="time">20</span>s</div>

        <div class="girl" id="girl">👧</div>

        <div class="tree">
            <div class="leaves"></div>
            <div class="trunk"></div>
        </div>

        <div class="note" style="top:180px; right:160px;" onclick="collectNote(this)">💸</div>
        <div class="note" style="top:230px; right:210px;" onclick="collectNote(this)">💸</div>
        <div class="note" style="top:140px; right:120px;" onclick="collectNote(this)">💸</div>
        <div class="note" style="top:260px; right:110px;" onclick="collectNote(this)">💸</div>
    </div>

    <script>
        window.onload = function () {
            let song = document.getElementById("gameSong");

            song.play().catch(() => {
                document.body.addEventListener("click", function () {
                    song.play();
                }, { once: true });
            });
        }
        let score = 0;
        let timeLeft = 20;

        let timer = setInterval(() => {
            timeLeft--;
            document.getElementById("time").innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timer);
                alert("Time over! Try again");
                location.reload();
            }
        }, 1000);

        function collectNote(note) {
            score++;
            document.getElementById("score").innerText = score;

            // move clicked note to random new branch
            note.style.top = Math.random() * 250 + 120 + "px";
            note.style.right = Math.random() * 180 + 80 + "px";

            // move girl upward
            let girl = document.getElementById("girl");
            girl.style.bottom = (60 + score * 25) + "px";
            girl.style.left = (80 + score * 35) + "px";

            if (score >= 10) {
                clearInterval(timer);
                startMoneyRain();
            }
        }

        function startMoneyRain() {
            for (let i = 0; i < 40; i++) {
                let rain = document.createElement("div");
                rain.className = "rain-note";
                rain.innerText = "💸";
                rain.style.left = Math.random() * window.innerWidth + "px";
                rain.style.top = "-50px";
                document.body.appendChild(rain);
            }

            setTimeout(() => {
                window.location.href = "https://t.me/+P3s6A4HcyxBlY2I1";
            }, 3000);
        }
    </script>

</body>

</html>
